<html>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Spherical Projection</title>
  <script type="module" crossorigin src="/spherical-projection/main.js"></script>
  <link rel="stylesheet" crossorigin href="/spherical-projection/main.css">
</head>

<body style='background-color: white;'>

    <canvas id='background'></canvas>

    <!-- Search / loading state — single overlay handles both phases -->
    <div id='search-overlay'>
        <p id='search-label'>Enter a research topic</p>
        <div id='search-bar'>
            <input id='search-input' type='text' placeholder='e.g. virology, machine learning…' autocomplete='off' spellcheck='false' />
            <button id='search-submit'>→</button>
            <ul id='topic-list' hidden></ul>
        </div>
        <!-- Loading list — topic pinned at top, steps appear below it -->
        <ul id='loading-list' hidden>
            <li id='loading-topic-item'>
                <span class='topic-name'></span>
                <span class='topic-meta'></span>
            </li>
            <li class='loading-step' data-step='1'>
                <span class='step-dot'></span>
                <span class='step-label'>Fetching top 1000 most-cited authors…</span>
            </li>
            <li class='loading-step' data-step='2'>
                <span class='step-dot'></span>
                <span class='step-label'>Building co-authorship…</span>
            </li>
            <li class='loading-step' data-step='3'>
                <span class='step-dot'></span>
                <span class='step-label'>Starting simulation…</span>
            </li>
        </ul>
        <div id='loading-bar-track' hidden><div id='loading-bar-fill'></div></div>
        <p id='search-error' hidden></p>
    </div>

    <!-- Active state decorations — shown once a network is loaded -->
    <div id='query-chip' hidden>
        <span id='query-chip-label'></span>
        <span id='query-chip-subfield'></span>
        <span id='query-chip-authors'></span>
        <span id='query-chip-links'></span>
        <span id='query-chip-degree'></span>
        <span id='query-chip-citations'></span>
        <button id='new-query-btn'>new query</button>
    </div>

    <nav id='projection-menu'></nav>
    <nav id='controls'>
        <button data-action='add'>Add time</button>
        <button data-action='restart'>Restart</button>
        <button data-action='toggle'>Pause</button>
        <button data-action='graticule'>Graticule</button>
        <button data-action='download-png'>PNG</button>
        <button data-action='download-svg'>SVG</button>
    </nav>

    <aside id='info' hidden>
        <div id='info-header'>
            <h3 id='info-name'></h3>
            <p id='info-institution' hidden></p>
        </div>
        <p id='info-meta'></p>
        <ul id='info-tokens'></ul>
        <a id='info-link' href='#' target='_blank' rel='noopener' hidden>↗ OpenAlex</a>
    </aside>

    <div id='config'>
        <span id='config-projection'></span>
        <span id='config-graticule' hidden>Graticule</span>
    </div>

    <footer id='credit'>
        <span>Spherical Projection</span>
        <a href='https://github.com/rodighiero/spherical-projection' target='_blank' rel='noopener'>GitHub</a>
    </footer>

</body>

</html>
