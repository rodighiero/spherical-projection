<html>

<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Spherical Projection</title>
<script defer src="main.js"></script><link href="main.css" rel="stylesheet"></head>

<body style='background-color: white;'>

    <canvas id='background'></canvas>

    <nav id='projection-menu'></nav>
    <nav id='controls'>
        <button data-action='add'>Add time</button>
        <button data-action='restart'>Restart</button>
        <button data-action='toggle'>Pause</button>
        <button data-action='graticule'>Graticule</button>
    </nav>

    <aside id='info' hidden>
        <h3 id='info-name'></h3>
        <p id='info-meta'></p>
        <ul id='info-tokens'></ul>
    </aside>

    <div id='config'>
        <span id='config-projection'></span>
        <span id='config-rotation'></span>
        <span id='config-graticule' hidden>Graticule</span>
    </div>

    <footer id='credit'>
        <span>Spherical Projection</span>
        <a href='https://github.com/rodighiero/spherical-projection' target='_blank' rel='noopener'>GitHub</a>
    </footer>

</body>

</html>
